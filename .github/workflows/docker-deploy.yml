name: Build and Deploy (Docker)

on:
  push:
    branches:
      - main
      - deploy/**
  workflow_dispatch:

concurrency:
  group: docker-deploy-musicas-igreja
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/musicas-igreja
  FRONT_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/musicas-igreja-frontend

jobs:
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Restore backend dependencies
        working-directory: backend
        run: dotnet restore
      
      - name: Restore test dependencies
        working-directory: backend.tests
        run: dotnet restore
      
      - name: Build backend
        working-directory: backend
        run: dotnet build --no-restore --configuration Release
      
      - name: Build tests
        working-directory: backend.tests
        run: dotnet build --no-restore --configuration Release
      
      - name: Run Unit Tests
        working-directory: backend.tests
        run: dotnet test --no-build --verbosity normal --configuration Release --logger "trx;LogFileName=test-results.trx"
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deploy-test-results
          path: backend.tests/TestResults

  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=http://localhost:5001
          tags: |
            ${{ env.FRONT_IMAGE_NAME }}:latest
            ${{ env.FRONT_IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy on self-hosted runner
    runs-on: self-hosted
    needs: build-and-push
    env:
      GHCR_NAMESPACE: ${{ github.repository_owner }}
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/musicas-igreja:latest
      FRONT_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/musicas-igreja-frontend:latest
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      BACKEND_URL: http://musicas-igreja:5000
      NEXT_PUBLIC_BACKEND_URL: http://musicas-igreja:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker info
        run: |
          docker version
          docker compose version

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix permissions for runner
        run: |
          set -e
          echo "=== Fixing workspace permissions ==="
          sudo chown -R $USER:$USER $GITHUB_WORKSPACE || true

      - name: Stop and remove old containers (preserving volumes)
        working-directory: ./backend
        run: |
          set -e
          echo "=== Stopping existing services (keeping volumes) ==="
          # IMPORTANTE: NÃO usar --volumes ou -v para preservar os dados!
          docker compose down --remove-orphans || true
          echo "=== Listing existing data volumes ==="
          docker volume ls | grep musicas || echo "No musicas volumes found yet"
          echo "=== Pruning unused containers ==="
          docker container prune -f || true

      - name: Prepare environment file for docker-compose
        working-directory: ./backend
        run: |
          set -e
          echo "GHCR_NAMESPACE=${GHCR_NAMESPACE}" > .env
          # Frontend-Backend communication URLs
          echo "BACKEND_URL=http://musicas-igreja:5000" >> .env
          echo "NEXT_PUBLIC_BACKEND_URL=http://localhost:5001" >> .env
          # Note: ASP.NET Core backend configuration is set in docker-compose.yml
          # Database__Path and Storage__OrganizedFolder are configured there

      - name: Pull and start services
        working-directory: ./backend
        run: |
          set -e
          echo "=== Environment file content ==="
          cat .env
          echo "=== Pulling images ==="
          docker compose pull
          echo "=== Starting services ==="
          docker compose up -d
          echo "=== Waiting 20 seconds for startup ==="
          sleep 20
          echo "=== Container status ==="
          docker compose ps
          echo "=== Container logs (last 20 lines) ==="
          docker compose logs --tail=20

      - name: Health check
        working-directory: ./backend
        run: |
          set -e
          echo "=== Checking if containers are running ==="
          docker compose ps
          echo "=== Backend logs (last 100 lines) ==="
          docker compose logs --tail=100 musicas-igreja || true
          echo "=== Backend container inspect ==="
          docker compose ps musicas-igreja || true
          echo "=== Backend container health ==="
          docker inspect musicas-igreja-app --format='{{.State.Health.Status}}' || true
          echo "=== Frontend logs (last 30 lines) ==="  
          docker compose logs --tail=30 frontend || true
          echo "=== Attempting health check ==="
          # Wait a bit more for services to stabilize
          sleep 15
          # Check if backend container is running
          if docker compose ps | grep musicas-igreja | grep -q "Up"; then
            echo "Backend container is running, testing health endpoint..."
            docker compose exec -T musicas-igreja curl -fsS http://localhost:5000/api/health || echo "Internal health check failed"
            sleep 5
            curl -fsS http://localhost:5001/api/health || echo "External health check failed"
          else
            echo "Backend container is not running properly"
            exit 1
          fi

      - name: Show recent logs on failure
        if: failure()
        working-directory: ./backend
        run: |
          docker compose logs --tail=200 musicas-igreja || true