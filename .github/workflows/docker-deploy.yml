name: Build and Deploy (Docker)

on:
  push:
    branches:
      - main
      - deploy/**
  workflow_dispatch:

concurrency:
  group: docker-deploy-musicas-igreja
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/musicas-igreja
  FRONT_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/musicas-igreja-frontend

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=http://localhost:5001
          tags: |
            ${{ env.FRONT_IMAGE_NAME }}:latest
            ${{ env.FRONT_IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy on self-hosted runner
    runs-on: self-hosted
    needs: build-and-push
    env:
      GHCR_NAMESPACE: ${{ github.repository_owner }}
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/musicas-igreja:latest
      FRONT_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/musicas-igreja-frontend:latest
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      BACKEND_URL: http://musicas-igreja:5000
      NEXT_PUBLIC_BACKEND_URL: http://musicas-igreja:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker info
        run: |
          docker version
          docker compose version

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop and remove old containers
        working-directory: ./backend
        run: |
          set -e
          echo "=== Stopping existing services ==="
          docker compose down --remove-orphans || true
          echo "=== Pruning unused containers ==="
          docker container prune -f || true

      - name: Prepare environment file for docker-compose
        working-directory: ./backend
        run: |
          set -e
          echo "GHCR_NAMESPACE=${GHCR_NAMESPACE}" > .env
          if [ -n "${SECRET_KEY}" ]; then
            echo "SECRET_KEY=${SECRET_KEY}" >> .env
          fi
          # Backend configuration
          echo "FLASK_ENV=production" >> .env
          echo "DATABASE_PATH=/data/pdf_organizer.db" >> .env
          echo "UPLOAD_FOLDER=/data/uploads" >> .env
          echo "ORGANIZED_FOLDER=/app/organized" >> .env
          echo "LOG_FOLDER=/data/logs" >> .env
          # Frontend-Backend communication URLs
          echo "BACKEND_URL=http://musicas-igreja:5000" >> .env
          echo "NEXT_PUBLIC_BACKEND_URL=http://localhost:5001" >> .env

      - name: Pull and start services
        working-directory: ./backend
        run: |
          set -e
          echo "=== Environment file content ==="
          cat .env
          echo "=== Pulling images ==="
          docker compose pull
          echo "=== Starting services ==="
          docker compose up -d
          echo "=== Waiting 20 seconds for startup ==="
          sleep 20
          echo "=== Container status ==="
          docker compose ps
          echo "=== Container logs (last 20 lines) ==="
          docker compose logs --tail=20

      - name: Health check
        working-directory: ./backend
        run: |
          set -e
          echo "=== Checking if containers are running ==="
          docker compose ps
          echo "=== Backend logs (last 100 lines) ==="
          docker compose logs --tail=100 musicas-igreja || true
          echo "=== Backend container inspect ==="
          docker compose ps musicas-igreja || true
          echo "=== Backend container health ==="
          docker inspect musicas-igreja-app --format='{{.State.Health.Status}}' || true
          echo "=== Frontend logs (last 30 lines) ==="  
          docker compose logs --tail=30 frontend || true
          echo "=== Attempting health check ==="
          # Wait a bit more for services to stabilize
          sleep 15
          # Check if backend container is running
          if docker compose ps | grep musicas-igreja | grep -q "Up"; then
            echo "Backend container is running, testing health endpoint..."
            docker compose exec -T musicas-igreja curl -fsS http://localhost:5000/health || echo "Internal health check failed"
            sleep 5
            curl -fsS http://localhost:5001/health || echo "External health check failed"
          else
            echo "Backend container is not running properly"
            exit 1
          fi

      - name: Show recent logs on failure
        if: failure()
        working-directory: ./backend
        run: |
          docker compose logs --tail=200 musicas-igreja || true