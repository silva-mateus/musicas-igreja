name: Build and Deploy (Docker)

on:
  push:
    branches:
      - main
      - deploy/**
  workflow_dispatch:

concurrency:
  group: docker-deploy-musicas-igreja
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/musicas-igreja
  FRONT_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/musicas-igreja-frontend

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.FRONT_IMAGE_NAME }}:latest
            ${{ env.FRONT_IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy on self-hosted runner
    runs-on: self-hosted
    needs: build-and-push
    env:
      GHCR_NAMESPACE: ${{ github.repository_owner }}
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/musicas-igreja:latest
      FRONT_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/musicas-igreja-frontend:latest
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      BACKEND_URL: ${{ secrets.BACKEND_URL || 'http://musicas-igreja:5000' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker info
        run: |
          docker version
          docker compose version

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare environment file for docker-compose
        working-directory: ./backend
        run: |
          set -e
          echo "GHCR_NAMESPACE=${GHCR_NAMESPACE}" > .env
          if [ -n "${SECRET_KEY}" ]; then
            echo "SECRET_KEY=${SECRET_KEY}" >> .env
          fi
          # Defaults (override here if needed)
          echo "FLASK_ENV=production" >> .env
          echo "DATABASE_PATH=/data/pdf_organizer.db" >> .env
          echo "UPLOAD_FOLDER=/data/uploads" >> .env
          echo "ORGANIZED_FOLDER=/data/organized" >> .env
          echo "LOG_FOLDER=/data/logs" >> .env
          echo "BACKEND_URL=${BACKEND_URL}" >> .env

      - name: Pull and start services
        working-directory: ./backend
        run: |
          set -e
          docker compose pull
          docker compose up -d
          docker compose ps

      - name: Health check
        working-directory: ./backend
        run: |
          set -e
          # Prefer internal health check from inside the container to avoid host curl dependency
          docker compose exec -T musicas-igreja curl -fsS http://localhost:5000/health

      - name: Show recent logs on failure
        if: failure()
        working-directory: ./backend
        run: |
          docker compose logs --tail=200 musicas-igreja || true


