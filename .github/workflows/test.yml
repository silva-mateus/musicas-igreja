name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore backend dependencies
      working-directory: backend
      run: dotnet restore
    
    - name: Restore test dependencies
      working-directory: backend.tests
      run: dotnet restore
    
    - name: Build backend
      working-directory: backend
      run: dotnet build --no-restore --configuration Release
    
    - name: Build tests
      working-directory: backend.tests
      run: dotnet build --no-restore --configuration Release
    
    - name: Run Unit Tests
      working-directory: backend.tests
      run: dotnet test --no-build --verbosity normal --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: backend.tests/TestResults
    
    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: coverage-report
        path: backend.tests/TestResults/**/coverage.cobertura.xml

  test-frontend:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: npm run build
    
    - name: Lint
      run: npm run lint

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Backend Docker Image
      run: docker build -t musicas-backend:test ./backend
    
    - name: Build Frontend Docker Image
      run: docker build -t musicas-frontend:test ./frontend
