name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore backend dependencies
      working-directory: backend
      run: dotnet restore

    - name: Restore test dependencies
      working-directory: backend.tests
      run: dotnet restore

    - name: Build backend
      working-directory: backend
      run: dotnet build --no-restore --configuration Release

    - name: Build tests
      working-directory: backend.tests
      run: dotnet build --no-restore --configuration Release

    - name: Run Unit Tests
      working-directory: backend.tests
      run: dotnet test --no-build --verbosity normal --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: backend.tests/TestResults

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: coverage-report
        path: backend.tests/TestResults/**/coverage.cobertura.xml

  test-core:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore core dependencies
      working-directory: core/backend
      run: dotnet restore

    - name: Build core
      working-directory: core/backend
      run: dotnet build --no-restore --configuration Release

    - name: Run Core Tests
      working-directory: core/backend
      run: dotnet test --no-build --verbosity normal --configuration Release

  test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Run Tests
      run: npm test

    - name: Lint
      run: npm run lint

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-frontend]

    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Start backend
      working-directory: backend
      run: |
        dotnet restore
        dotnet build --configuration Release
        dotnet run --configuration Release &
      env:
        ASPNETCORE_URLS: http://localhost:5000
        ASPNETCORE_ENVIRONMENT: Development

    - name: Wait for backend
      run: |
        for i in $(seq 1 30); do
          curl -s http://localhost:5000/health && break
          sleep 2
        done

    - name: Build frontend
      run: npm run build
      env:
        BACKEND_URL: http://localhost:5000

    - name: Start frontend
      run: npm run start &
      env:
        PORT: 3000
        BACKEND_URL: http://localhost:5000

    - name: Wait for frontend
      run: |
        for i in $(seq 1 30); do
          curl -s http://localhost:3000 && break
          sleep 2
        done

    - name: Run E2E tests
      run: npx playwright test
      env:
        E2E_BASE_URL: http://localhost:3000
        E2E_USERNAME: admin
        E2E_PASSWORD: admin
        CI: true

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 14

    - name: Upload E2E results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-results
        path: frontend/e2e-results.json
        retention-days: 14

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-core, test-frontend]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build Backend Docker Image
      run: docker build -t musicas-backend:test -f backend/Dockerfile .

    - name: Build Frontend Docker Image
      run: docker build -t musicas-frontend:test -f frontend/Dockerfile .
