# Nome do workflow que aparecerá no GitHub Actions
name: Deploy Músicas Igreja (Full Stack)

# Eventos que irão disparar este workflow
on:
  push:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    # Testar Backend Flask
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache dependências Python
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Instalar dependências do backend
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Verificar sintaxe Python do backend
      run: |
        python -m py_compile backend/app.py

    - name: Teste de importação do backend
      run: |
        cd backend
        python -c "import app; print('✅ Backend importado com sucesso')"

    # Testar Frontend NextJS
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Cache dependências Node
      uses: actions/cache@v3
      with:
        path: frontend/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/frontend/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Instalar dependências do frontend
      run: |
        cd frontend
        npm ci

    - name: Verificar tipos TypeScript
      run: |
        cd frontend
        npm run type-check

    - name: Build do frontend
      run: |
        cd frontend
        npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:5000

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Checkout código
      uses: actions/checkout@v4

    - name: Login no Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extrair metadados para ${{ matrix.component }}
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build e Push da imagem Docker (${{ matrix.component }})
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/${{ matrix.component }}/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Login no Container Registry (no runner local)
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Deploy para servidor (executado diretamente no runner local)
      env: 
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:5000' }}
      run: |
        # Define as variáveis para facilitar o uso no script
        BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend"
        FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend"
        
        echo "Iniciando o deploy do sistema completo..."

        # Cria o diretório do projeto no servidor se não existir
        mkdir -p ~/musicas-igreja
        
        # Copia arquivos de configuração
        cp docker-compose.yml ~/musicas-igreja/
        cp -r docker/ ~/musicas-igreja/
        cd ~/musicas-igreja
        
        echo "Verificando se Docker está disponível..."
        docker --version
        docker compose version
        
        # Puxa as imagens mais recentes
        echo "Fazendo pull das imagens..."
        docker pull ${BACKEND_IMAGE}:latest
        docker pull ${FRONTEND_IMAGE}:latest
        
        # Atualiza as imagens no docker-compose.yml
        sed -i "s|build:|# build:|g" docker-compose.yml
        sed -i "s|context: \.|# context: \.|g" docker-compose.yml
        sed -i "s|dockerfile: docker/backend/Dockerfile|# dockerfile: docker/backend/Dockerfile|g" docker-compose.yml
        sed -i "s|dockerfile: docker/frontend/Dockerfile|# dockerfile: docker/frontend/Dockerfile|g" docker-compose.yml
        
        # Adiciona as imagens do registry
        sed -i "/container_name: musicas-igreja-backend/i\\    image: ${BACKEND_IMAGE}:latest" docker-compose.yml
        sed -i "/container_name: musicas-igreja-frontend/i\\    image: ${FRONTEND_IMAGE}:latest" docker-compose.yml
        
        # Para e remove os contêineres antigos
        echo "Parando containers antigos..."
        docker compose down || true
        
        # Limpa imagens Docker antigas
        echo "Limpando imagens antigas..."
        docker image prune -f
        
        # Inicia os contêineres com as novas imagens
        echo "Iniciando containers..."
        docker compose up -d --force-recreate
        
        # Verifica o status dos contêineres
        echo "Aguardando containers iniciarem..."
        sleep 20
        
        echo "Status dos containers:"
        docker compose ps
        
        echo "Logs do backend (últimas 20 linhas):"
        docker compose logs --tail=20 backend
        
        echo "Logs do frontend (últimas 20 linhas):"
        docker compose logs --tail=20 frontend

  health-check:
    needs: deploy
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Verificar saúde da aplicação
      run: |
        echo "Iniciando verificação de saúde da aplicação..."
        cd ~/musicas-igreja
        
        # Verificar se os containers estão rodando
        if docker compose ps | grep -q "backend.*Up" && docker compose ps | grep -q "frontend.*Up"; then
          echo "✅ Containers estão rodando"
        else
          echo "❌ Nem todos os containers estão rodando"
          docker compose ps
          exit 1
        fi
        
        # Verificar health check do backend
        echo "Verificando health check do backend..."
        for i in {1..12}; do
          if docker compose exec -T backend curl -f http://localhost:5000/health 2>/dev/null; then
            echo "✅ Backend health check passou!"
            backend_health=true
            break
          else
            echo "⏳ Tentativa $i/12: Backend health check aguardando..."
            sleep 10
          fi
        done
        
        # Verificar se frontend está respondendo
        echo "Verificando se frontend está respondendo..."
        for i in {1..12}; do
          if docker compose exec -T frontend curl -f http://localhost:3000/ 2>/dev/null; then
            echo "✅ Frontend está respondendo!"
            frontend_health=true
            break
          else
            echo "⏳ Tentativa $i/12: Frontend aguardando..."
            sleep 10
          fi
        done
        
        # Verificar acesso externo se APP_URL estiver configurada
        if [ -n "${{ secrets.APP_URL }}" ]; then
          echo "Verificando acesso externo via ${{ secrets.APP_URL }}..."
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.APP_URL }}" || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Aplicação acessível externamente (HTTP $response)"
          else
            echo "⚠️  Aplicação não acessível externamente (HTTP $response)"
          fi
        fi
        
        # Verificar se ambos os health checks passaram
        if [ "$backend_health" != "true" ] || [ "$frontend_health" != "true" ]; then
          echo "❌ Health checks falharam"
          echo "Logs do backend:"
          docker compose logs --tail=30 backend
          echo "Logs do frontend:"
          docker compose logs --tail=30 frontend
          exit 1
        fi
        
        echo "✅ Deploy do sistema completo concluído com sucesso!"