# Nome do workflow que aparecerá no GitHub Actions
name: Deploy Músicas Igreja

# Eventos que irão disparar este workflow
on:
  push:
    branches:
      - main # Dispara quando há um push para a branch 'main'
      - master # Se você usa 'master' também

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest # Este job roda nos servidores do GitHub (nuvem)
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache dependências pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verificar sintaxe Python
      run: |
        python -m py_compile app.py

    - name: Teste de importação
      run: |
        python -c "import app; print('✅ Aplicação importada com sucesso')"

  build:
    needs: test # Este job só roda se o job 'test' for bem-sucedido
    runs-on: ubuntu-latest # Este job roda nos servidores do GitHub (nuvem)
    permissions:
      contents: read
      packages: write # Permissão necessária para empurrar imagens para o GHCR

    steps:
    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Checkout código
      uses: actions/checkout@v4

    - name: Login no Container Registry
      # Este passo só executa se não for uma Pull Request (para evitar push desnecessário)
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }} # ghcr.io
        username: ${{ github.actor }} # Seu usuário GitHub
        password: ${{ secrets.GITHUB_TOKEN }} # Token gerado automaticamente pelo GitHub

    - name: Extrair metadados
      # Ajuda a gerar tags de imagem mais inteligentes (ex: branch, SHA, latest)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build e Push da imagem Docker
      # Constrói a imagem Docker e a envia para o GHCR
      uses: docker/build-push-action@v5
      with:
        context: . # O Dockerfile está na raiz do seu repositório
        push: ${{ github.event_name != 'pull_request' }} # Só empurra se não for uma PR
        tags: ${{ steps.meta.outputs.tags }} # Usa as tags geradas pelo passo 'meta'
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha # Usa cache do GitHub Actions para builds mais rápidos
        cache-to: type=gha,mode=max # Salva o cache para builds futuros

  deploy:
    needs: build # Este job só roda se o job 'build' for bem-sucedido
    runs-on: self-hosted # <-- ESTE É O SEU SERVIDOR HOMELAB COM O RUNNER
    # Só faz o deploy se o push for para as branches 'main' ou 'master'
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Login no Container Registry (no seu runner local)
      # Necessário para puxar a imagem do GHCR para o seu homelab
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Deploy para servidor (executado diretamente no runner local)
      # Define variáveis de ambiente que estarão disponíveis para o script 'run'
      env: 
        SECRET_KEY: ${{ secrets.APP_SECRET_KEY }} # Passa a SECRET_KEY da sua aplicação
      run: |
        # Define as variáveis para facilitar o uso no script
        IMAGE_FULL_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
        
        echo "Iniciando o deploy da imagem ${IMAGE_FULL_NAME}:latest..."

        # Cria o diretório do projeto no servidor se não existir
        mkdir -p ~/musicas-igreja
        
        # Copia o docker-compose.yml do workspace atual (já foi feito checkout)
        cp docker-compose.yml ~/musicas-igreja/
        cd ~/musicas-igreja
        
        echo "Verificando se Docker está disponível..."
        docker --version
        docker compose version
        
        # Puxa a imagem mais recente do GHCR para o seu self-hosted runner
        echo "Fazendo pull da imagem..."
        docker pull ${IMAGE_FULL_NAME}:latest
        
        # Para e remove os contêineres antigos definidos no docker-compose.yml
        echo "Parando containers antigos..."
        docker compose down || true # '|| true' evita que o workflow falhe se o contêiner não existir
        
        # Limpa imagens Docker antigas antes de iniciar (para economizar espaço)
        echo "Limpando imagens antigas..."
        docker image prune -f
        
        # Inicia os contêineres com a nova imagem
        echo "Iniciando containers..."
        # --force-recreate garante que o contêiner seja recriado com as novas variáveis de ambiente
        docker compose up -d --force-recreate 
        
        # Verifica o status dos contêineres e logs para depuração
        echo "Aguardando containers iniciarem..."
        sleep 15 # Dá mais tempo para os contêineres iniciarem
        
        echo "Status dos containers:"
        docker compose ps
        
        echo "Logs da aplicação (últimas 30 linhas):"
        docker compose logs --tail=30 musicas-igreja
        
        echo "Verificando se a aplicação está respondendo..."
        # Tenta verificar o health check local
        for i in {1..10}; do
          if docker compose exec -T musicas-igreja curl -f http://localhost:5000/health; then
            echo "✅ Aplicação está respondendo no health check!"
            break
          else
            echo "⏳ Tentativa $i/10: Aguardando aplicação inicializar..."
            sleep 5
          fi
        done

  health-check:
    needs: deploy # Este job só roda se o job 'deploy' for bem-sucedido
    runs-on: self-hosted # Executa no mesmo runner do deploy para acessar localhost
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Verificar saúde da aplicação
      run: |
        echo "Iniciando verificação de saúde da aplicação..."
        cd ~/musicas-igreja
        
        # Verificar se o container está rodando
        if docker compose ps | grep -q "musicas-igreja.*Up"; then
          echo "✅ Container está rodando"
        else
          echo "❌ Container não está rodando"
          docker compose ps
          exit 1
        fi
        
        # Verificar health check interno
        echo "Verificando health check interno..."
        for i in {1..12}; do
          if docker compose exec -T musicas-igreja curl -f http://localhost:5000/health 2>/dev/null; then
            echo "✅ Health check interno passou!"
            health_internal=true
            break
          else
            echo "⏳ Tentativa $i/12: Health check interno aguardando..."
            sleep 10
          fi
        done
        
        # Verificar acesso externo se APP_URL estiver configurada
        if [ -n "${{ secrets.APP_URL }}" ]; then
          echo "Verificando acesso externo via ${{ secrets.APP_URL }}..."
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.APP_URL }}/health" || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Aplicação acessível externamente (HTTP $response)"
          else
            echo "⚠️  Aplicação não acessível externamente (HTTP $response)"
            echo "Isso pode ser normal se a aplicação só for acessível localmente"
          fi
        else
          echo "⚠️  APP_URL não configurada, verificando apenas localhost"
        fi
        
        # Verificar se health check interno passou
        if [ "$health_internal" != "true" ]; then
          echo "❌ Health check interno falhou"
          echo "Logs da aplicação:"
          docker compose logs --tail=50 musicas-igreja
          exit 1
        fi
        
        echo "✅ Deploy concluído com sucesso!"
