services:
  musicas-igreja:
    # A seção 'build' foi removida porque a imagem é construída e empurrada para o GHCR
    # pelo GitHub Actions 'build' job, e depois puxada pelo 'deploy' job.
    image: ghcr.io/${GHCR_NAMESPACE}/musicas-igreja:latest
    container_name: musicas-igreja-app # Nome único para o seu contêiner
    restart: unless-stopped # Reinicia o contêiner a menos que ele seja parado manualmente
    ports:
      - "80:5000" # <-- ATENÇÃO: Mapeia a porta 80 do host para a porta 5000 do contêiner.
                  # Se sua aplicação Python roda em outra porta interna, ajuste o '5000'.
                  # Se quiser acessar por outra porta externa no host, ajuste o '80'.
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY} # A variável SECRET_KEY será injetada do ambiente do host (via GitHub Actions)
      - DATABASE_PATH=/data/pdf_organizer.db
      - UPLOAD_FOLDER=/data/uploads
      - ORGANIZED_FOLDER=/app/organized
      - LOG_FOLDER=/data/logs
    volumes:
      # Volume para persistir os dados da aplicação (banco de dados, uploads, logs)
      - musicas_data:/data
      # Pasta organizada compartilhada com o host (usar mesmo caminho em dev/prod)
      - ./organized:/app/organized
      # Montagem opcional de um diretório 'config' do host para dentro do contêiner (somente leitura)
      - ./config:/app/config:ro
    networks:
      - musicas-network # Conecta o serviço à rede Docker definida abaixo
    healthcheck: # Configuração de healthcheck para o Docker monitorar a saúde do contêiner
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"] # Endpoint de saúde da sua aplicação
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s # Tempo para a aplicação iniciar antes de começar a verificar

  frontend:
    image: ghcr.io/${GHCR_NAMESPACE}/musicas-igreja-frontend:latest
    container_name: musicas-igreja-front
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - BACKEND_URL=${BACKEND_URL}
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - musicas-igreja
    networks:
      - musicas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"] 
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# A seção 'traefik' e seus volumes relacionados foram REMOVIDOS, pois você não precisa de um proxy reverso para acesso local.

networks:
  musicas-network:
    driver: bridge # Define uma rede bridge interna para os contêineres

volumes:
  musicas_data:
    driver: local # Define um volume local para persistir os dados da aplicação
