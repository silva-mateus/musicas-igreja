version: '3.8'

services:
  # Backend Flask API
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: musicas-igreja-backend
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-default-secret-change-in-production}
      - DATABASE_PATH=/app/data/pdf_organizer.db
      - UPLOAD_FOLDER=/app/data/uploads
      - ORGANIZED_FOLDER=/app/data/organized
      - LOG_FOLDER=/app/data/logs
      - PORT=5000
      - FRONTEND_URL=http://frontend:3000
    volumes:
      # Volume para persistir dados do backend
      - backend_data:/app/data
      # Configurações opcionais
      - ./config:/app/config:ro
    networks:
      - musicas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    ports:
      - "5000:5000"  # Expor para desenvolvimento/debug

  # Frontend NextJS
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: musicas-igreja-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:5000
      - PORT=3000
    depends_on:
      - backend
    networks:
      - musicas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "80:3000"  # Porta principal da aplicação

  # Nginx como proxy reverso (opcional, para produção)
  nginx:
    image: nginx:alpine
    container_name: musicas-igreja-nginx
    restart: unless-stopped
    ports:
      - "8080:80"  # Porta alternativa via nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - musicas-network
    profiles:
      - production  # Só ativa em produção

networks:
  musicas-network:
    driver: bridge

volumes:
  backend_data:
    driver: local